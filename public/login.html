<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your student account to submit feedback and view your complaints.">
  <title>Login — College Feedback System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand"><span>🎓</span> CollegeFeedback</a>
      <div class="nav-right">
        <span id="auth-links"></span>
        <button class="theme-toggle" id="theme-toggle">🌙</button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="auth-container fade-in">
      <div class="card auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to access your dashboard</p>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="your.email@college.edu" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;" id="login-btn">
            🔐 Login
          </button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="/register.html">Register here</a>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
