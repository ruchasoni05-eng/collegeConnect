<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View and manage your submitted complaints and feedback.">
  <title>Student Dashboard — College Feedback System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand"><span>🎓</span> CollegeFeedback</a>
      <button class="nav-toggle" id="nav-toggle">☰</button>
      <ul class="nav-links" id="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/submit.html">Submit</a></li>
        <li><a href="/track.html">Track</a></li>
        <li><a href="/dashboard.html" class="active">Dashboard</a></li>
        <li><a href="/confessions.html">Confessions</a></li>
      </ul>
      <div class="nav-right">
        <span id="auth-links"></span>
        <button class="theme-toggle" id="theme-toggle">🌙</button>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <!-- Welcome Header -->
    <div class="page-header fade-in">
      <h1 id="welcome-msg">👋 Welcome Back!</h1>
      <p>View all your submitted feedback and complaints</p>
    </div>

    <!-- Quick Actions -->
    <div class="d-flex gap-16 mb-32 flex-wrap fade-in fade-in-delay-1">
      <a href="/submit.html" class="btn btn-primary">📝 New Submission</a>
      <a href="/track.html" class="btn btn-secondary">🔍 Track Complaint</a>
      <button class="btn btn-secondary" onclick="logout()">🚪 Logout</button>
    </div>

    <!-- My Complaints List -->
    <div class="fade-in fade-in-delay-2">
      <h2 class="mb-16">📋 My Submissions</h2>
      <div id="complaints-list">
        <div class="empty-state">
          <p>Loading your complaints...</p>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
